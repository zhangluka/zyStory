<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Diary</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0891B2;
            --secondary: #22D3EE;
            --cta: #22C55E;
            --background: #ECFEFF;
            --text: #164E63;
            --border: #BAE6FD;
            --card-bg: #FFFFFF;
            --accent: #06B6D4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3 {
            font-family: 'Archivo', sans-serif;
            font-weight: 300;
            letter-spacing: -0.02em;
        }

        /* 现代化头部 */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(135deg, #ECFEFF 0%, #F0F9FF 100%);
        }

        .hero-content {
            text-align: center;
            z-index: 2;
            max-width: 800px;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInUp 1s ease-out;
        }

        .hero .subtitle {
            font-size: clamp(1.2rem, 3vw, 1.5rem);
            color: var(--text);
            opacity: 0.8;
            margin-bottom: 3rem;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        /* 浮动几何装饰 */
        .floating-shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .shape1 {
            top: 20%;
            left: 10%;
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation-delay: 0s;
        }

        .shape2 {
            top: 60%;
            right: 15%;
            width: 120px;
            height: 120px;
            background: var(--secondary);
            border-radius: 63% 37% 54% 46% / 55% 48% 52% 45%;
            animation-delay: 5s;
        }

        .shape3 {
            bottom: 20%;
            left: 20%;
            width: 60px;
            height: 60px;
            background: var(--cta);
            border-radius: 40% 60% 60% 40% / 60% 30% 70% 40%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-30px) rotate(120deg); }
            66% { transform: translateY(-20px) rotate(240deg); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 计时器区域 */
        .stats-section {
            padding: 80px 20px;
            background: white;
            position: relative;
        }

        .stats-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            text-align: center;
        }

        .stat-card {
            padding: 40px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .stat-number {
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
            font-family: 'Archivo', sans-serif;
        }

        .stat-label {
            color: var(--text);
            opacity: 0.7;
            font-size: 1.1rem;
        }

        /* 创意时间线 */
        .timeline-section {
            padding: 80px 20px;
            background: var(--background);
            position: relative;
        }

        .timeline-header {
            text-align: center;
            margin-bottom: 80px;
        }

        .timeline-header h2 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .timeline {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            transform: translateX(-50%);
        }

        .timeline-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 80px;
            position: relative;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .timeline-item:nth-child(even) {
            flex-direction: row-reverse;
        }

        .timeline-content {
            width: 45%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--border);
            position: relative;
        }

        .timeline-content:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
        }

        .timeline-dot {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            border: 4px solid var(--card-bg);
            box-shadow: 0 0 0 4px var(--border);
            z-index: 1;
        }

        .timeline-date {
            font-size: 0.9rem;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .timeline-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--text);
            font-family: 'Archivo', sans-serif;
            font-weight: 500;
        }

        .timeline-text {
            color: var(--text);
            opacity: 0.8;
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .timeline-meta {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
            color: var(--text);
            opacity: 0.6;
        }

        /* 照片网格 */
        .gallery-section {
            padding: 80px 20px;
            background: white;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .gallery-header h2 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .gallery-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            grid-auto-flow: dense;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .gallery-item:nth-child(3n+1) {
            grid-row: span 2;
        }

        .gallery-item:nth-child(4n) {
            grid-column: span 2;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 0%, rgba(0,0,0,0.7) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: flex-end;
            padding: 20px;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-caption {
            color: white;
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* 添加按钮 */
        .fab {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 60px;
            height: 60px;
            background: var(--cta);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            z-index: 100;
        }

        .fab:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 20px 25px -5px rgba(34, 197, 94, 0.6);
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 30px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-header h2 {
            font-size: 2rem;
            color: var(--text);
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text);
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .close-btn:hover {
            opacity: 1;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--card-bg);
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(8, 145, 178, 0.4);
        }

        .btn-secondary {
            background: var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: #94A3B8;
        }

        /* 通知提示 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--cta);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(34, 197, 94, 0.4);
            transform: translateX(400px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2000;
        }

        .notification.show {
            transform: translateX(0);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .timeline::before {
                left: 30px;
            }

            .timeline-item,
            .timeline-item:nth-child(even) {
                flex-direction: column;
                align-items: flex-start;
            }

            .timeline-content {
                width: calc(100% - 60px);
                margin-left: 60px;
            }

            .timeline-dot {
                left: 30px;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
            }

            .gallery-item:nth-child(3n+1),
            .gallery-item:nth-child(4n) {
                grid-row: span 1;
                grid-column: span 1;
            }

            .fab {
                bottom: 20px;
                right: 20px;
            }

            .stats-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--background);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary);
        }
    </style>
</head>
<body>
    <!-- 几何装饰背景 -->
    <div class="floating-shape shape1"></div>
    <div class="floating-shape shape2"></div>
    <div class="floating-shape shape3"></div>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Love Diary</h1>
            <p class="subtitle">记录我们的美好瞬间</p>
        </div>
    </section>

    <!-- Statistics Section -->
    <section class="stats-section">
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-number" id="days-together">0</div>
                <div class="stat-label">天在一起</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="memories-count">3</div>
                <div class="stat-label">珍贵回忆</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="photos-count">8</div>
                <div class="stat-label">美好照片</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">∞</div>
                <div class="stat-label">未来可期</div>
            </div>
        </div>
    </section>

    <!-- Timeline Section -->
    <section class="timeline-section">
        <div class="timeline-header">
            <h2>我们的时光</h2>
        </div>
        <div class="timeline" id="timeline">
            <div class="timeline-item">
                <div class="timeline-content">
                    <div class="timeline-date">2023.01.15</div>
                    <h3 class="timeline-title">第一次约会</h3>
                    <p class="timeline-text">在咖啡厅的午后，阳光透过窗户洒在你脸上，那一刻世界都静止了。</p>
                    <div class="timeline-meta">
                        <span><i class="fas fa-map-marker-alt"></i> 星巴克</span>
                        <span><i class="fas fa-heart"></i> 甜蜜</span>
                    </div>
                </div>
                <div class="timeline-dot"></div>
            </div>

            <div class="timeline-item">
                <div class="timeline-content">
                    <div class="timeline-date">2023.03.20</div>
                    <h3 class="timeline-title">海边漫步</h3>
                    <p class="timeline-text">夕阳西下，海风轻抚，你靠在我肩上说着未来的梦想。</p>
                    <div class="timeline-meta">
                        <span><i class="fas fa-map-marker-alt"></i> 青岛海滩</span>
                        <span><i class="fas fa-heart"></i> 浪漫</span>
                    </div>
                </div>
                <div class="timeline-dot"></div>
            </div>

            <div class="timeline-item">
                <div class="timeline-content">
                    <div class="timeline-date">2023.05.12</div>
                    <h3 class="timeline-title">生日惊喜</h3>
                    <p class="timeline-text">你亲手做的蛋糕，虽然有点歪，但那是我吃过最甜的味道。</p>
                    <div class="timeline-meta">
                        <span><i class="fas fa-map-marker-alt"></i> 家里</span>
                        <span><i class="fas fa-heart"></i> 温馨</span>
                    </div>
                </div>
                <div class="timeline-dot"></div>
            </div>
        </div>
    </section>

    <!-- Gallery Section -->
    <section class="gallery-section">
        <div class="gallery-header">
            <h2>照片墙</h2>
        </div>
        <div class="gallery-grid" id="gallery">
            <div class="gallery-item">
                <img src="https://picsum.photos/seed/love1/400/300.jpg" alt="回忆1">
                <div class="gallery-overlay">
                    <span class="gallery-caption">第一次旅行</span>
                </div>
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/seed/love2/400/600.jpg" alt="回忆2">
                <div class="gallery-overlay">
                    <span class="gallery-caption">海边日落</span>
                </div>
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/seed/love3/400/400.jpg" alt="回忆3">
                <div class="gallery-overlay">
                    <span class="gallery-caption">咖啡时光</span>
                </div>
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/seed/love4/800/400.jpg" alt="回忆4">
                <div class="gallery-overlay">
                    <span class="gallery-caption">生日派对</span>
                </div>
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/seed/love5/400/300.jpg" alt="回忆5">
                <div class="gallery-overlay">
                    <span class="gallery-caption">公园漫步</span>
                </div>
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/seed/love6/400/300.jpg" alt="回忆6">
                <div class="gallery-overlay">
                    <span class="gallery-caption">电影之夜</span>
                </div>
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/seed/love7/400/300.jpg" alt="回忆7">
                <div class="gallery-overlay">
                    <span class="gallery-caption">美食探索</span>
                </div>
            </div>
            <div class="gallery-item">
                <img src="https://picsum.photos/seed/love8/400/300.jpg" alt="回忆8">
                <div class="gallery-overlay">
                    <span class="gallery-caption">周末时光</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Floating Action Button -->
    <button class="fab" onclick="openModal()">
        <i class="fas fa-plus"></i>
    </button>

    <!-- Modal -->
    <div id="memoryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>添加回忆</h2>
                <button class="close-btn" onclick="closeModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="memoryForm">
                <div class="form-group">
                    <label class="form-label">标题</label>
                    <input type="text" class="form-input" id="memoryTitle" required>
                </div>
                <div class="form-group">
                    <label class="form-label">日期</label>
                    <input type="date" class="form-input" id="memoryDate" required>
                </div>
                <div class="form-group">
                    <label class="form-label">回忆</label>
                    <textarea class="form-textarea" id="memoryContent" required></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">地点</label>
                    <input type="text" class="form-input" id="memoryLocation">
                </div>
                <div class="form-group">
                    <label class="form-label">标签</label>
                    <select class="form-select" id="memoryTag">
                        <option value="甜蜜">甜蜜</option>
                        <option value="浪漫">浪漫</option>
                        <option value="温馨">温馨</option>
                        <option value="搞笑">搞笑</option>
                        <option value="感动">感动</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">保存</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification">
        回忆添加成功！
    </div>

    <script>
        // 计算天数
        function calculateDays() {
            const startDate = new Date('2023-01-01');
            const currentDate = new Date();
            const diffTime = Math.abs(currentDate - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            document.getElementById('days-together').textContent = diffDays;
        }

        // 模态框控制
        function openModal() {
            document.getElementById('memoryModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('memoryModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            document.getElementById('memoryForm').reset();
        }

        // 显示通知
        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // 添加新回忆
        document.getElementById('memoryForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const title = document.getElementById('memoryTitle').value;
            const date = document.getElementById('memoryDate').value;
            const content = document.getElementById('memoryContent').value;
            const location = document.getElementById('memoryLocation').value;
            const tag = document.getElementById('memoryTag').value;
            
            // 创建新的时间线项目
            const timelineItem = document.createElement('div');
            timelineItem.className = 'timeline-item';
            timelineItem.style.animationDelay = '0s';
            
            timelineItem.innerHTML = `
                <div class="timeline-content">
                    <div class="timeline-date">${date.replace(/-/g, '.')}</div>
                    <h3 class="timeline-title">${title}</h3>
                    <p class="timeline-text">${content}</p>
                    <div class="timeline-meta">
                        ${location ? `<span><i class="fas fa-map-marker-alt"></i> ${location}</span>` : ''}
                        <span><i class="fas fa-heart"></i> ${tag}</span>
                    </div>
                </div>
                <div class="timeline-dot"></div>
            `;
            
            // 添加到时间线
            document.getElementById('timeline').appendChild(timelineItem);
            
            // 更新回忆计数
            const memoriesCount = document.getElementById('memories-count');
            memoriesCount.textContent = parseInt(memoriesCount.textContent) + 1;
            
            // 关闭模态框
            closeModal();
            
            // 显示成功提示
            showNotification('回忆添加成功！');
            
            // 滚动到新的回忆
            timelineItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
        });

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('memoryModal');
            if (event.target === modal) {
                closeModal();
            }
        };

        // ESC键关闭模态框
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            calculateDays();
            setInterval(calculateDays, 60000); // 每分钟更新一次
            
            // 添加滚动动画
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -100px 0px'
            };
            
            const observer = new IntersectionObserver(function(entries) {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.animationPlayState = 'running';
                    }
                });
            }, observerOptions);
            
            document.querySelectorAll('.timeline-item').forEach(item => {
                item.style.animationPlayState = 'paused';
                observer.observe(item);
            });
        });

        // 照片网格点击放大效果
        document.querySelectorAll('.gallery-item').forEach(item => {
            item.addEventListener('click', function() {
                // 这里可以添加图片放大查看的功能
                const img = this.querySelector('img');
                const caption = this.querySelector('.gallery-caption').textContent;
                console.log('查看照片:', caption);
            });
        });
    </script>
</body>
</html>
